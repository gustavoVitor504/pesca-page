<section class="sub-header">
  <h1 class="sub-header__title">Equipamentos de Pesca Premium</h1>
  <p class="sub-header__subtitle">Tudo que você precisa para sua próxima pescaria</p>
  <div class="sub-header__search-wrapper">
    <input
      class="sub-header__search"
      type="text"
      placeholder="Buscar varas, iscas, acessórios..."
      (input)="buscar($event)"
    />
    <span class="material-icons sub-header__search-icon">search</span>
  </div>
</section>
