<div class="header-content">
  <div class="logo-content">
    <logo-component></logo-component>
    <h1>Tuvira & Tevaro</h1>
  </div>

  <!-- Botão hamburguer (só aparece no mobile) -->
  <button class="menu-toggle" (click)="toggleMenu()">
    <span class="material-icons">{{ menuAberto ? 'close' : 'menu' }}</span>
  </button>

  <nav class="navigation" [class.open]="menuAberto">
    <ul>
      <li><a routerLink="/" (click)="fecharMenu()">Home</a></li>
      <li><a routerLink="/varas" (click)="fecharMenu()">Varas</a></li>
      <li><a routerLink="/iscas" (click)="fecharMenu()">Iscas</a></li>
      <li>
        <a routerLink="/carrinho" class="cart-icon" (click)="fecharMenu()">
          <span class="material-icons">shopping_cart</span>
          <span class="cart-badge" *ngIf="(totalItems$ | async)! > 0">
            {{ totalItems$ | async }}
          </span>
        </a>
      </li>
      <button *ngIf="!isLoggedIn" (click)="irParaLogin()" class="btn-login">
        Entrar
      </button>
      <div *ngIf="isLoggedIn" class="user-info">
        <span>Olá, {{ username }}</span>
        <button (click)="logout()" class="btn-logout">Sair</button>
      </div>
    </ul>
  </nav>
</div>
